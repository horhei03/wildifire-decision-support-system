# Training Configuration

# Experiment settings
experiment_name: "convlstm_baseline"
random_seed: 42

# Training parameters
epochs: 20
batch_size: 4  # Reduced for memory-constrained systems
learning_rate: 0.0001

# Optimizer
optimizer:
  type: "adam"
  learning_rate: 0.0001
  beta_1: 0.9
  beta_2: 0.999
  epsilon: 1e-7

# Data splits
train_split: 0.7
val_split: 0.15
test_split: 0.15

# Data augmentation (if applicable)
augmentation:
  enabled: false
  rotation: false
  flip: false

# Callbacks
early_stopping:
  enabled: true
  monitor: "val_loss"
  patience: 10
  restore_best_weights: true

reduce_lr:
  enabled: true
  monitor: "val_loss"
  factor: 0.5
  patience: 5
  min_lr: 1e-7

model_checkpoint:
  enabled: true
  monitor: "val_loss"
  save_best_only: true
  save_weights_only: true

tensorboard:
  enabled: true
  histogram_freq: 1

csv_logger:
  enabled: true

# Prediction horizon
prediction_horizon: 10  # minutes

# Class weights (for imbalanced data)
class_weights:
  enabled: false
  weight_0: 1.0  # safe
  weight_1: 2.0  # danger (give more weight to danger class)

# Hardware
use_mixed_precision: false
gpu_memory_growth: true
